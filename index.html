<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron Bisla</title>
    <meta name="description" content="Aaron Bisla — photographer and creative. Film, digital, and everything in between.">
    <meta property="og:title" content="Aaron Bisla">
    <meta property="og:description" content="Photographer and creative. Film, digital, and everything in between.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://aaronbisla.com">
    <link rel="canonical" href="https://aaronbisla.com">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap');

        :root {
            --cyan: #00f0ff;
            --magenta: #ff00aa;
            --bg: #050505;
            --text: #d0d0d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 60px; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Scanlines ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.06) 1px, rgba(0,0,0,0.06) 3px);
            animation: scanline-drift 0.1s steps(2) infinite;
        }

        @keyframes scanline-drift {
            0% { transform: translateY(0); }
            100% { transform: translateY(3px); }
        }

        /* ── Screen flicker ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9997;
            pointer-events: none;
            background: transparent;
            animation: screen-flicker 8s infinite;
        }

        @keyframes screen-flicker {
            0%,97%,100% { opacity: 0; }
            97.5% { opacity: 1; background: rgba(0,240,255,0.015); }
            98% { opacity: 0; }
            98.5% { opacity: 1; background: rgba(255,0,170,0.01); }
            99% { opacity: 0; }
        }

        /* ── HUD overlay ── */
        .hud {
            position: fixed;
            inset: 0;
            z-index: 9990;
            pointer-events: none;
            font-family: 'Space Mono', monospace;
            color: var(--cyan);
        }

        .hud-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            opacity: 0.15;
        }
        .hud-corner::before, .hud-corner::after {
            content: '';
            position: absolute;
            background: var(--cyan);
        }
        .hud-tl { top: 12px; left: 12px; }
        .hud-tl::before { top: 0; left: 0; width: 20px; height: 1px; }
        .hud-tl::after { top: 0; left: 0; width: 1px; height: 20px; }
        .hud-tr { top: 12px; right: 12px; }
        .hud-tr::before { top: 0; right: 0; width: 20px; height: 1px; }
        .hud-tr::after { top: 0; right: 0; width: 1px; height: 20px; }
        .hud-bl { bottom: 12px; left: 12px; }
        .hud-bl::before { bottom: 0; left: 0; width: 20px; height: 1px; }
        .hud-bl::after { bottom: 0; left: 0; width: 1px; height: 20px; }
        .hud-br { bottom: 12px; right: 12px; }
        .hud-br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
        .hud-br::after { bottom: 0; right: 0; width: 1px; height: 20px; }

        .hud-data {
            position: absolute;
            bottom: 16px;
            left: 50px;
            font-size: 0.5rem;
            letter-spacing: 0.2em;
            opacity: 0.1;
            animation: hud-blink 4s infinite;
        }

        .hud-ts {
            position: absolute;
            top: 16px;
            right: 50px;
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            opacity: 0.1;
            animation: hud-blink 5s infinite;
        }

        .hud-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
            opacity: 0.06;
        }

        .hud-vline {
            position: absolute;
            top: 60px;
            right: 40px;
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, var(--cyan), transparent);
            opacity: 0.06;
        }

        @keyframes hud-blink {
            0%,45%,55%,100% { opacity: 0.1; }
            50% { opacity: 0.25; }
        }

        /* ── Glitch band — random horizontal distortion ── */
        .glitch-band {
            position: fixed;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--cyan);
            opacity: 0;
            z-index: 9996;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* ── Header ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px) saturate(1.4);
            background: rgba(5,5,5,0.5);
            border-bottom: 1px solid rgba(0,240,255,0.06);
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--cyan);
            text-decoration: none;
            text-shadow: 0 0 25px rgba(0,240,255,0.4);
        }

        nav { display: flex; gap: 2rem; }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.4;
            transition: all 0.3s;
        }
        nav a:hover { opacity: 1; color: var(--cyan); text-shadow: 0 0 12px rgba(0,240,255,0.5); }

        /* ── Hero Collage ── */
        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            position: relative;
        }

        .hero-cell {
            overflow: hidden;
            position: relative;
        }

        .hero-cell img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            filter: contrast(1.35) brightness(0.55);
            transform: scale(1.1);
            transition: transform 15s ease-out, filter 1.5s ease;
        }

        .hero:hover .hero-cell img {
            transform: scale(1.02);
        }

        .hero-cell:nth-child(1) { grid-row: 1 / -1; }

        /* Neon edge glow between cells */
        .hero-cell::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .hero-overlay h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.8rem, 6vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #fff;
            position: relative;
            animation: glitch-text 6s infinite;
            text-indent: 0.3em;
        }

        .hero-overlay h1::before,
        .hero-overlay h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; right: 0;
            overflow: hidden;
        }
        .hero-overlay h1::before {
            color: var(--cyan);
            z-index: -1;
            animation: glitch-1 4s infinite linear alternate-reverse;
        }
        .hero-overlay h1::after {
            color: var(--magenta);
            z-index: -2;
            animation: glitch-2 3s infinite linear alternate-reverse;
        }

        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.55rem, 1vw, 0.75rem);
            letter-spacing: 0.6em;
            text-transform: uppercase;
            opacity: 0.4;
            margin-top: 0.8rem;
            text-indent: 0.6em;
        }

        .scroll-cue {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--cyan), transparent);
            opacity: 0.3;
            animation: scroll-pulse 2.5s infinite;
        }

        @keyframes scroll-pulse {
            0%,100% { opacity: 0.2; height: 40px; }
            50% { opacity: 0.6; height: 55px; }
        }

        @keyframes glitch-1 {
            0%,94% { clip-path: inset(0); transform: translate(0); }
            95% { clip-path: inset(15% 0 65% 0); transform: translate(-3px); }
            96% { clip-path: inset(55% 0 15% 0); transform: translate(4px); }
            97% { clip-path: inset(75% 0 5% 0); transform: translate(-2px); }
            98% { clip-path: inset(0); transform: translate(0); }
        }

        @keyframes glitch-2 {
            0%,92% { clip-path: inset(0); transform: translate(0); }
            93% { clip-path: inset(35% 0 40% 0); transform: translate(5px); }
            94% { clip-path: inset(10% 0 75% 0); transform: translate(-3px); }
            95% { clip-path: inset(0); transform: translate(0); }
        }

        @keyframes glitch-text {
            0%,88% { text-shadow: none; }
            89% { text-shadow: -4px 0 var(--cyan), 4px 0 var(--magenta); }
            90% { text-shadow: 3px 0 var(--cyan), -3px 0 var(--magenta); }
            91% { text-shadow: none; }
            95% { text-shadow: -2px 0 var(--magenta), 2px 0 var(--cyan); }
            96% { text-shadow: none; }
        }

        /* ── Shared gallery styles ── */
        .section-head {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0.2;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .section-head::before { content: '[ '; color: var(--cyan); opacity: 0.5; }
        .section-head::after { content: ' ]'; color: var(--cyan); opacity: 0.5; }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 5%, var(--cyan) 50%, transparent 95%);
            opacity: 0.08;
            margin: 0 auto;
            max-width: 90%;
        }

        /* ── Mono Section ── */
        .mono {
            padding: 5rem 1rem;
        }

        .mono-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 180px;
            gap: 3px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .mono-grid .item {
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .mono-grid .item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(1.5) brightness(0.85);
            transition: filter 0.7s ease, transform 0.7s ease;
        }

        .mono-grid .item:hover img {
            transform: scale(1.06);
            filter: grayscale(100%) contrast(1.6) brightness(1);
        }

        /* Accent items reveal color on hover */
        .mono-grid .item.accent:hover img {
            filter: grayscale(0%) contrast(1.2) saturate(1.6) brightness(1.05);
        }

        .mono-grid .item.accent::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: var(--magenta);
            opacity: 0;
            transition: opacity 0.4s, box-shadow 0.4s;
            z-index: 2;
        }
        .mono-grid .item.accent:hover::after {
            opacity: 1;
            box-shadow: 0 0 20px var(--magenta), 0 -5px 30px rgba(255,0,170,0.15);
        }

        /* Grid placement — fixed layout, no gaps */
        .m1 { grid-column: 1 / 5; grid-row: 1 / 4; }
        .m2 { grid-column: 5 / 9; grid-row: 1 / 3; }
        .m3 { grid-column: 9 / 13; grid-row: 1 / 2; }
        .m4 { grid-column: 9 / 13; grid-row: 2 / 4; }
        .m5 { grid-column: 5 / 8; grid-row: 3 / 5; }
        .m6 { grid-column: 1 / 5; grid-row: 4 / 6; }
        .m7 { grid-column: 8 / 13; grid-row: 4 / 6; }

        /* ── Color Section ── */
        .chromatic {
            padding: 5rem 1rem;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 180px;
            gap: 3px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .color-grid .item {
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .color-grid .item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            filter: contrast(1.25) saturate(1.4) brightness(0.95);
            transition: transform 0.7s ease, filter 0.5s ease;
        }

        .color-grid .item:hover img {
            transform: scale(1.05);
            filter: contrast(1.35) saturate(1.6) brightness(1.05);
        }

        .color-grid .item::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
            border: 1px solid transparent;
            transition: all 0.4s;
            pointer-events: none;
        }
        .color-grid .item:hover::before {
            border-color: var(--cyan);
            box-shadow: inset 0 0 40px rgba(0,240,255,0.08);
        }

        .c1 { grid-column: 1 / 6; grid-row: 1 / 4; }
        .c2 { grid-column: 6 / 9; grid-row: 1 / 3; }
        .c3 { grid-column: 9 / 13; grid-row: 1 / 2; }
        .c4 { grid-column: 9 / 13; grid-row: 2 / 4; }
        .c5 { grid-column: 6 / 9; grid-row: 3 / 5; }
        .c6 { grid-column: 1 / 4; grid-row: 4 / 6; }
        .c7 { grid-column: 4 / 9; grid-row: 5 / 7; }
        .c8 { grid-column: 9 / 13; grid-row: 4 / 7; }
        .c9 { grid-column: 1 / 4; grid-row: 6 / 7; }

        /* ── About ── */
        .about {
            padding: 7rem 2rem;
            max-width: 650px;
            margin: 0 auto;
            text-align: center;
        }

        .about p {
            font-size: 1.1rem;
            line-height: 2;
            opacity: 0.6;
        }

        .about p em {
            font-style: normal;
            color: var(--cyan);
            opacity: 1;
        }

        /* ── Contact ── */
        .contact { padding: 5rem 2rem 2rem; text-align: center; }

        .socials { display: flex; justify-content: center; gap: 3rem; margin-bottom: 3rem; }

        .socials a {
            color: var(--text);
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.3;
            transition: all 0.3s;
            padding-bottom: 3px;
            border-bottom: 1px solid transparent;
        }
        .socials a:hover {
            opacity: 1;
            color: var(--cyan);
            border-bottom-color: var(--cyan);
            text-shadow: 0 0 15px rgba(0,240,255,0.4);
        }

        footer {
            padding: 2rem;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            opacity: 0.12;
            letter-spacing: 0.25em;
        }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.97);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border: 1px solid rgba(0,240,255,0.08);
        }

        /* ── Scroll animations ── */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s cubic-bezier(0.16,1,0.3,1), transform 1.2s cubic-bezier(0.16,1,0.3,1);
        }
        .reveal.vis { opacity: 1; transform: translateY(0); }

        .reveal-l { opacity: 0; transform: translateX(-50px); transition: opacity 1s ease, transform 1s ease; }
        .reveal-r { opacity: 0; transform: translateX(50px); transition: opacity 1s ease, transform 1s ease; }
        .reveal-l.vis, .reveal-r.vis { opacity: 1; transform: translateX(0); }

        /* stagger children */
        .stagger > .item { opacity: 0; transform: translateY(30px) scale(0.97); transition: opacity 0.8s ease, transform 0.8s ease; }
        .stagger > .item.vis { opacity: 1; transform: translateY(0) scale(1); }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .mono-grid, .color-grid {
                grid-template-columns: repeat(6, 1fr);
                grid-auto-rows: 150px;
            }
            .m1 { grid-column: 1 / 4; grid-row: 1 / 3; }
            .m2 { grid-column: 4 / 7; grid-row: 1 / 3; }
            .m3 { grid-column: 1 / 3; grid-row: 3 / 4; }
            .m4 { grid-column: 3 / 7; grid-row: 3 / 5; }
            .m5 { grid-column: 1 / 3; grid-row: 4 / 6; }
            .m6 { grid-column: 3 / 5; grid-row: 5 / 7; }
            .m7 { grid-column: 5 / 7; grid-row: 5 / 7; }
            .c1 { grid-column: 1 / 4; grid-row: 1 / 3; }
            .c2 { grid-column: 4 / 7; grid-row: 1 / 2; }
            .c3 { grid-column: 4 / 7; grid-row: 2 / 3; }
            .c4 { grid-column: 1 / 3; grid-row: 3 / 5; }
            .c5 { grid-column: 3 / 7; grid-row: 3 / 4; }
            .c6 { grid-column: 3 / 5; grid-row: 4 / 5; }
            .c7 { grid-column: 5 / 7; grid-row: 4 / 6; }
            .c8 { grid-column: 1 / 3; grid-row: 5 / 7; }
            .c9 { grid-column: 3 / 5; grid-row: 5 / 7; }
        }

        @media (max-width: 600px) {
            header { padding: 1rem; }
            nav { gap: 1.2rem; }
            nav a { font-size: 0.55rem; }
            .hero { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); }
            .hero-cell:nth-child(1) { grid-row: 1 / 3; }
            .hero-cell:nth-child(5) { display: none; }
            .mono-grid, .color-grid {
                grid-template-columns: 1fr 1fr;
                grid-auto-rows: 200px;
            }
            .m1,.m2,.m3,.m4,.m5,.m6,.m7,
            .c1,.c2,.c3,.c4,.c5,.c6,.c7,.c8,.c9 {
                grid-column: auto; grid-row: auto;
            }
            .m1,.c1 { grid-column: 1 / -1; }
            .socials { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Aaron Bisla</a>
    <nav>
        <a href="#mono">Mono</a>
        <a href="#color">Color</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="color-grid stagger">
        <div class="item c1"><img src="images/DSC01266-054fa899-2500.jpg" alt="Neon portrait" loading="lazy"></div>
        <div class="item c2"><img src="images/00690_22A-27a90197-2500.jpg" alt="Film warm" loading="lazy"></div>

        <div class="item c4"><img src="images/DSC01513-343f182c-1500.jpg" alt="Studio" loading="lazy"></div>
        <div class="item c5"><img src="images/DSC00143-9d1ac48a-2500.jpg" alt="Open road" loading="lazy"></div>
        <div class="item c6"><img src="images/Scan281-2-2c3067f2-2500.jpg" alt="Street" loading="lazy"></div>
        <div class="item c7"><img src="images/DSC01191-f5e79821-2500.jpg" alt="Portrait" loading="lazy"></div>
        <div class="item c8"><img src="images/DSC01266-054fa899-2500.jpg" alt="Neon close" loading="lazy"></div>

    </div>
</section>

<div class="divider"></div>

<!-- ── About ── -->
<section class="about" id="about">
    <div class="section-head reveal">About</div>
    <p class="reveal">Capturing people and places on <em>film</em> and <em>digital</em>. Based in the moments between the planned ones.</p>

<div class="hud">

    <div class="hud-corner hud-tr"></div>
    <div class="hud-corner hud-bl"></div>
    <div class="hud-corner hud-br"></div>
    <div class="hud-data">SYS::44RON // FRAME ACTIVE // ISO AUTO</div>
    <div class="hud-ts" id="hud-clock">00:00:00</div>
    <div class="hud-bar"></div>
    <div class="hud-vline"></div>
</div>

<div class="glitch-band" id="glitch-band"></div>

<div class="lightbox" id="lightbox"><img src="" alt="Full size"></div>

<script>
(function() {
    // Lightbox
    const lb = document.getElementById('lightbox');
    const lbi = lb.querySelector('img');
    document.querySelectorAll('.item img, .hero-cell img').forEach(img => {
        img.addEventListener('click', () => {
            lbi.src = img.src;
            lbi.alt = img.alt;
            lb.classList.add('active');
        });
    });
    lb.addEventListener('click', () => lb.classList.remove('active'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('active'); });

    // Scroll reveal
    const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
    }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.reveal, .reveal-l, .reveal-r').forEach(el => io.observe(el));

    // Stagger gallery items on scroll
    const staggerObs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            const items = entry.target.querySelectorAll('.item');
            items.forEach((item, i) => {
                setTimeout(() => item.classList.add('vis'), i * 120);
            });
            staggerObs.unobserve(entry.target);
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.stagger').forEach(g => staggerObs.observe(g));

    // Parallax on gallery images
    function raf() {
        document.querySelectorAll('.mono-grid .item img, .color-grid .item img').forEach(img => {
            const r = img.getBoundingClientRect();
            const off = ((r.top + r.height / 2) - window.innerHeight / 2) * 0.04;
            img.style.transform = `translateY(${off}px) scale(1.1)`;
        });
        requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    // Smooth nav scroll
    document.querySelectorAll('nav a').forEach(a => {
        a.addEventListener('click', e => {
            e.preventDefault();
            const t = document.querySelector(a.getAttribute('href'));
            if (t) t.scrollIntoView({ behavior: 'smooth' });
        });
    });

    // Randomize hero zoom origins
    document.querySelectorAll('.hero-cell img').forEach(img => {
        img.style.transformOrigin = `${30 + Math.random() * 40}% ${30 + Math.random() * 40}%`;
    });

    // HUD clock
    const hudClock = document.getElementById('hud-clock');
    if (hudClock) {
        setInterval(() => {
            const d = new Date();
            hudClock.textContent = d.toTimeString().slice(0, 8);
        }, 1000);
    }

    // Random glitch band
    const band = document.getElementById('glitch-band');
    if (band) {
        function fireGlitch() {
            const y = Math.random() * window.innerHeight;
            const w = 1 + Math.random() * 3;
            band.style.top = y + 'px';
            band.style.height = w + 'px';
            band.style.opacity = 0.15 + Math.random() * 0.2;
            band.style.background = Math.random() > 0.5 ? 'var(--cyan)' : 'var(--magenta)';
            setTimeout(() => { band.style.opacity = 0; }, 50 + Math.random() * 100);
            setTimeout(fireGlitch, 3000 + Math.random() * 8000);
        }
        setTimeout(fireGlitch, 2000);
    }
})();
</script>
</body>
